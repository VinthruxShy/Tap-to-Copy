<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoV Ultra Planner - mission.html</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Chakra Petch', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
        .mission-item { background: #111; border: 1px solid #222; transition: 0.2s; padding: 10px 14px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .mission-item.active { border-color: #FE2C55; background: rgba(254, 44, 85, 0.1); }
        .clip-btn { transition: all 0.2s; border: 1px solid #222; position: relative; }
        .clip-btn.selected { background: #FE2C55 !important; border-color: #FE2C55; color: white; box-shadow: 0 0 15px rgba(254, 44, 85, 0.4); }
        .vip-badge { position: absolute; top: -6px; right: -6px; background: #FFD700; color: #000; font-size: 7px; padding: 1px 4px; border-radius: 4px; font-weight: bold; }
        .special-badge { position: absolute; top: -6px; right: -6px; background: #00f2ff; color: #000; font-size: 7px; padding: 1px 4px; border-radius: 4px; font-weight: bold; }
        .nav-active { color: #FE2C55 !important; border-top: 2px solid #FE2C55; }
        nav { background: rgba(10, 10, 10, 0.98); border-top: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen pb-32">

    <div class="w-full max-w-md space-y-4">
        <header class="text-center py-4 border-b border-gray-900">
            <h1 class="text-2xl font-bold tracking-tighter uppercase italic">RoV <span class="text-[#FE2C55]">ULTRA</span> AI</h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-1">High-Precision Planning System</p>
        </header>

        <div class="glass-card p-5 border-[#FE2C55]/20 border text-center">
            <h3 class="text-[10px] text-gray-500 uppercase font-bold mb-3 tracking-widest">เป้าหมายคูปองที่ต้องการ</h3>
            <div class="flex gap-2">
                <input type="number" id="customInput" placeholder="1300" class="flex-grow bg-black border border-gray-800 p-4 rounded-2xl text-xl font-bold text-center text-white outline-none focus:border-[#FE2C55]">
                <button onclick="runUltraAI()" class="bg-[#FE2C55] text-white px-8 rounded-2xl font-bold text-sm active:scale-95 transition-all">คำนวณ</button>
            </div>
            <button onclick="fullReset()" class="w-full mt-3 p-2 rounded-xl text-[10px] bg-gray-900 text-gray-500 font-bold uppercase hover:text-white transition-colors">ล้างข้อมูลทั้งหมด</button>
        </div>

        <div class="glass-card p-6 sticky top-2 z-30 border-[#FE2C55]/30 border shadow-[0_0_30px_rgba(254,44,85,0.2)] text-center">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">แต้มสะสมปัจจุบัน</p>
            <h2 id="totalPts" class="text-6xl font-bold text-white tracking-tighter">0</h2>
            
            <div id="aiAdvice" class="mt-4 p-3 rounded-xl bg-white/5 text-[#25F4EE] text-[11px] font-bold italic">
                <span>ระบุเป้าหมายเพื่อเริ่มคำนวณ</span>
            </div>

            <div id="exchangeSummary" class="mt-4 pt-4 border-t border-gray-800 text-left space-y-3 hidden">
                <div id="exchangeList" class="text-sm text-white font-bold mb-1"></div>
                <button onclick="copyBaseOnly(event)" class="w-full bg-sky-500/20 hover:bg-sky-500/30 text-sky-400 text-[10px] font-bold py-3 rounded-xl border border-sky-500/30 transition-all">
                    <span id="copyBaseText">คัดลอกแผนงาน</span>
                </button>
                <button onclick="copyUpdateOnly(event)" class="w-full bg-[#FE2C55] hover:bg-[#FE2C55]/80 text-white text-[10px] font-bold py-3 rounded-xl transition-all">
                    <span id="copyUpdateText">คัดลอกรางวัลที่ต้องรอรับ</span>
                </button>
                <div class="flex justify-between items-center bg-black/50 p-3 rounded-xl mt-2 text-[10px]">
                    <div>ต้องใช้: <span id="usedPts" class="text-sky-400 font-bold">0</span></div>
                    <div id="remainLabel">ขาด/เหลือ: <span id="remainPts" class="font-bold">0</span></div>
                </div>
            </div>
        </div>

        <div class="glass-card p-5">
            <div class="flex justify-between items-center mb-3 text-xs font-bold uppercase tracking-widest">
                <span>🎬 จำนวนคลิป (<span id="clipCount" class="text-[#FE2C55]">0</span>/24)</span>
                <span class="text-[9px] text-gray-500">ย่อย: <span id="subCount" class="text-white">0</span>/30</span>
            </div>
            <div class="grid grid-cols-5 gap-3" id="clipGrid"></div>
        </div>

        <div class="glass-card p-5 space-y-2">
            <h3 class="text-xs font-bold text-sky-400 uppercase italic border-l-2 border-sky-400 pl-2">📅 Monthly Missions</h3>
            <div id="monthlyList" class="space-y-2"></div>
        </div>

        <div class="glass-card p-5 space-y-2">
            <h3 class="text-xs font-bold text-[#FE2C55] mb-2 uppercase italic border-l-2 border-[#FE2C55] pl-2">🕒 12H & VIP Missions</h3>
            <div id="updateList" class="space-y-2"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 p-4 flex justify-around items-center z-50 pb-6 rounded-t-3xl shadow-[0_-10px_20px_rgba(0,0,0,0.5)]">
        <a href="index.html" class="flex flex-col items-center gap-1 text-gray-500 font-bold uppercase text-[10px]">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" /></svg>
            Tags
        </a>
        <a href="mission.html" class="flex flex-col items-center gap-1 nav-active font-bold uppercase text-[10px] pt-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>
            Mission
        </a>
        <a href="calc.html" class="flex flex-col items-center gap-1 text-gray-500 font-bold uppercase text-[10px]">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
            Calc
        </a>
    </nav>

    <script>
        const clipData = [
            {v:6, vip:false}, {v:6, vip:false}, {v:8, vip:true}, {v:8, vip:true}, {v:8, vip:true},
            {v:8, vip:true}, {v:8, vip:true}, {v:10, vip:true}, {v:10, vip:true}, {v:10, vip:true},
            {v:8, vip:true}, {v:8, vip:true}, {v:8, vip:true}, {v:10, vip:true}, {v:10, vip:true},
            {v:10, vip:true}, {v:10, vip:true}, {v:12, vip:true}, {v:12, vip:true}, {v:12, vip:true},
            {v:12, vip:true}, {v:10, vip:true}, {v:10, vip:false, special:true}, {v:10, vip:false, special:true}
        ];

        const monthlyM = [
            {id:'m500', name:'500 วิว', pts:20}, {id:'m5k', name:'5,000 วิว', pts:20},
            {id:'m30k', name:'30,000 วิว', pts:20}, {id:'m30full', name:'ครบ 30 เควสย่อย', pts:60}
        ];
        
        const updateM = [
            {id:'l100', name:'100 ไลค์', pts:15}, {id:'v10k', name:'10k วิว/คลิป', pts:20},
            {id:'c2', name:'ลงครบ 2 คลิป', pts:10}, {id:'c5', name:'ลงครบ 5 คลิป', pts:10},
            {id:'c10', name:'ลงครบ 10 คลิป', pts:10}, {id:'c15', name:'ลงครบ 15 คลิป', pts:10},
            {id:'vip1', name:'VIP 1 งาน', pts:10}, {id:'vip3', name:'VIP 3 งาน', pts:10},
            {id:'vip7', name:'VIP 7 งาน', pts:10}, {id:'vip12', name:'VIP 12 งาน', pts:10},
            {id:'tiktok', name:'ผูก TikTok', pts:10}, {id:'first', name:'ลงครั้งแรก', pts:10}
        ];

        let selClips = new Set();
        let selMissions = new Set();
        let currentGoal = 0;

        function getBasePoints() {
            let pts = 0;
            selClips.forEach(idx => {
                if (idx === 0) pts += 20;
                // ให้ 50 แต้มเฉพาะเมื่อคลิปนั้นเป็นพิเศษ และไม่ใช่คลิปที่ 1 หรือ 2 (index 0, 1)
                else if (clipData[idx].special) pts += 50;
                else pts += 25;
            });
            selMissions.forEach(id => {
                const m = monthlyM.find(x => x.id === id);
                if(m) pts += m.pts;
            });
            return pts;
        }

        // ... (คงฟังก์ชัน getUpdatePoints, updatePoints, copyBaseOnly, copyUpdateOnly, calculateExchange ไว้เหมือนเดิม) ...

        function getUpdatePoints() {
            let pts = 0;
            selMissions.forEach(id => {
                const u = updateM.find(x => x.id === id);
                if(u) pts += u.pts;
            });
            return pts;
        }

        function updatePoints() {
            const base = getBasePoints();
            const update = getUpdatePoints();
            const total = base + update;
            if(selClips.size * 4 >= 30) selMissions.add('m30full'); else selMissions.delete('m30full');
            document.getElementById('totalPts').innerText = total.toLocaleString();
            document.getElementById('clipCount').innerText = selClips.size;
            document.getElementById('subCount').innerText = selClips.size * 4;
            calculateExchange(total);
        }

        function copyBaseOnly(event) {
            const pts = getBasePoints();
            const text = `📊 แผนงานลงคลิป\nคลิปที่ลง: ${selClips.size} คลิป\nแต้มพื้นฐาน: ${pts} แต้ม`;
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById('copyBaseText').innerText = "คัดลอกแล้ว! ✅";
                setTimeout(() => document.getElementById('copyBaseText').innerText = "คัดลอกแผนงาน", 2000);
            });
        }

        function copyUpdateOnly(event) {
            let uText = "";
            selMissions.forEach(id => {
                const u = updateM.find(x => x.id === id);
                if(u) uText += `• ${u.name}\n`;
            });
            const text = `🕒 รางวัลที่ต้องรอรับ (อัปเดต 12 ชม.)\nเป้าหมาย: ${currentGoal} คูปอง\n\n✅ รายการที่ต้องรอรับ:\n${uText || 'ไม่มี'}`;
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById('copyUpdateText').innerText = "คัดลอกแล้ว! ✅";
                setTimeout(() => document.getElementById('copyUpdateText').innerText = "คัดลอกรางวัลที่ต้องรอรับ", 2000);
            });
        }

        function calculateExchange(pts) {
            let best = null;
            for (let c1 = 0; c1 <= 2; c1++) for (let c2 = 0; c2 <= 3; c2++) for (let c3 = 0; c3 <= 4; c3++) {
                if ((c1*500)+(c2*300)+(c3*100) === currentGoal) {
                    let cost = (c1*300)+(c2*180)+(c3*70);
                    if (!best || cost < best.cost) best = {c1, c2, c3, cost};
                }
            }
            const summary = document.getElementById('exchangeSummary');
            if (best && currentGoal > 0) {
                summary.classList.remove('hidden');
                let res = [];
                if (best.c1 > 0) res.push(`500 x ${best.c1}`);
                if (best.c2 > 0) res.push(`300 x ${best.c2}`);
                if (best.c3 > 0) res.push(`100 x ${best.c3}`);
                document.getElementById('exchangeList').innerText = "สูตรแลก: " + res.join(' + ');
                document.getElementById('usedPts').innerText = best.cost;
                const diff = pts - best.cost;
                document.getElementById('remainPts').innerText = diff.toLocaleString();
                document.getElementById('remainPts').className = diff < 0 ? "text-red-500 font-bold" : "text-sky-400 font-bold";
            } else { summary.classList.add('hidden'); }
        }

        function runUltraAI() {
            const val = parseInt(document.getElementById('customInput').value) || 0;
            if (val <= 0) return;
            fullReset(); currentGoal = val;
            let targetCost = 0;
            for(let c1=0; c1<=2; c1++) for(let c2=0; c2<=3; c2++) for(let c3=0; c3<=4; c3++) {
                if((c1*500)+(c2*300)+(c3*100) === currentGoal) {
                    let cost = (c1*300)+(c2*180)+(c3*70);
                    if(targetCost === 0 || cost < targetCost) targetCost = cost;
                }
            }
            if(targetCost === 0) return;
            selMissions.add('tiktok'); selMissions.add('first');
            
            // ลำดับการเลือก: 1. เลือกคลิปปกติก่อนจนครบ 2 คลิป 2. ค่อยเริ่มเลือกคลิปพิเศษ
            const normalClips = [];
            const specialClips = [];
            clipData.forEach((c, i) => c.special ? specialClips.push(i) : normalClips.push(i));
            
            // จัดเรียง: เอาคลิปปกติ 2 อันแรกขึ้นก่อน เพื่อให้ครบ 3 คลิปถึงจะเริ่มใช้ special
            const priorityOrder = [...normalClips.slice(0, 2), ...specialClips, ...normalClips.slice(2)];

            for(let i of priorityOrder) {
                if (getBasePoints() + getUpdatePoints() >= targetCost) break;
                selClips.add(i);
                selMissions.add('m500'); selMissions.add('m5k'); selMissions.add('l100');
                updateMissionsByCount();
                updatePoints();
            }
            document.getElementById('aiAdvice').innerHTML = `AI แนะนำทำ <span class="text-white">${selClips.size} คลิป</span>`;
            render();
        }

        function updateMissionsByCount() {
            const count = selClips.size;
            if(count >= 2) selMissions.add('c2'); if(count >= 5) selMissions.add('c5');
            if(count >= 10) selMissions.add('c10'); if(count >= 15) selMissions.add('c15');
            const vC = Array.from(selClips).filter(idx => clipData[idx].vip).length;
            if(vC >= 1) selMissions.add('vip1'); if(vC >= 3) selMissions.add('vip3'); if(vC >= 7) selMissions.add('vip7'); if(vC >= 12) selMissions.add('vip12');
            selClips.forEach(idx => { if(clipData[idx].v >= 10) selMissions.add('v10k'); });
            let totalV = Array.from(selClips).reduce((s, idx) => s + clipData[idx].v, 0);
            if(totalV >= 30) selMissions.add('m30k');
        }

        function render() {
            const grid = document.getElementById('clipGrid'); grid.innerHTML = '';
            clipData.forEach((c, i) => {
                const btn = document.createElement('div');
                btn.className = `clip-btn h-12 flex flex-col items-center justify-center rounded-xl text-[10px] cursor-pointer ${selClips.has(i) ? 'selected' : 'bg-[#0a0a0a] text-gray-500'}`;
                btn.innerHTML = `<span>${i+1}</span><span class="text-[8px] opacity-60">${c.v}k</span>${c.vip ? '<span class="vip-badge">VIP</span>' : ''}${c.special ? '<span class="special-badge">50P</span>' : ''}`;
                btn.onclick = () => { selClips.has(i) ? selClips.delete(i) : selClips.add(i); updatePoints(); render(); };
                grid.appendChild(btn);
            });
            const mList = document.getElementById('monthlyList'); mList.innerHTML = '';
            monthlyM.forEach(m => createItem(m, mList));
            const uList = document.getElementById('updateList'); uList.innerHTML = '';
            updateM.forEach(m => createItem(m, uList));
            updatePoints();
        }

        function createItem(m, container) {
            const div = document.createElement('div');
            div.className = `mission-item ${selMissions.has(m.id) ? 'active' : ''}`;
            div.innerHTML = `<span class="text-xs font-bold">${m.name} (+${m.pts})</span> <input type="checkbox" ${selMissions.has(m.id)?'checked':''}>`;
            div.onclick = (e) => { e.preventDefault(); selMissions.has(m.id) ? selMissions.delete(m.id) : selMissions.add(m.id); updatePoints(); render(); };
            container.appendChild(div);
        }

        function fullReset() { selClips.clear(); selMissions.clear(); currentGoal = 0; render(); }
        window.onload = render;
    </script>
</body>
</html>
