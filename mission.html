<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoV Ultra Planner - mission.html</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Chakra Petch', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
        .mission-item { background: #111; border: 1px solid #222; transition: 0.2s; padding: 10px 14px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .mission-item.active { border-color: #FE2C55; background: rgba(254, 44, 85, 0.1); }
        .clip-btn { transition: all 0.2s; border: 1px solid #222; position: relative; }
        .clip-btn.selected { background: #FE2C55 !important; border-color: #FE2C55; color: white; box-shadow: 0 0 15px rgba(254, 44, 85, 0.4); }
        .nav-active { color: #FE2C55 !important; border-top: 2px solid #FE2C55; }
        .quick-tag { background: #1a1a1a; border: 1px solid #333; color: #888; transition: 0.15s; cursor: pointer; flex: 1 1 calc(25% - 8px); min-width: 65px; }
        .quick-tag:active { background: #FE2C55; color: white; border-color: #FE2C55; transform: scale(0.95); }
        nav { background: rgba(10, 10, 10, 0.98); border-top: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen pb-32">

    <div class="w-full max-w-md space-y-4">
        <header class="text-center py-4 border-b border-gray-900">
            <h1 class="text-2xl font-bold tracking-tighter uppercase italic">RoV <span class="text-[#FE2C55]">ULTRA</span> AI</h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-1">Tag-Based Planning 2026</p>
        </header>

        <!-- โซนกรอกเป้าหมาย (ปรับปรุง Layout สำหรับมือถือ) -->
        <div class="glass-card p-5 border-[#FE2C55]/20 border">
            <h3 class="text-[10px] text-gray-500 uppercase font-bold mb-3 tracking-widest text-center">ระบุเป้าหมายคูปอง</h3>
            
            <div class="space-y-3 mb-4">
                <input type="number" id="customInput" placeholder="จำนวนคูปอง" class="w-full bg-black border border-gray-800 p-4 rounded-2xl text-2xl font-bold text-center text-white outline-none focus:border-[#FE2C55]">
                <button onclick="runUltraAI()" class="w-full bg-[#FE2C55] text-white py-4 rounded-2xl font-bold text-lg active:scale-95 shadow-lg shadow-[#FE2C55]/20">คำนวณคูปอง</button>
            </div>

            <div class="flex flex-wrap justify-center gap-2 mb-4">
                <button onclick="setGoal(100)" class="quick-tag py-2 rounded-xl text-[11px] font-bold">100</button>
                <button onclick="setGoal(300)" class="quick-tag py-2 rounded-xl text-[11px] font-bold">300</button>
                <button onclick="setGoal(500)" class="quick-tag py-2 rounded-xl text-[11px] font-bold">500</button>
                <button onclick="setGoal(800)" class="quick-tag py-2 rounded-xl text-[11px] font-bold">800</button>
                <button onclick="setGoal(900)" class="quick-tag py-2 rounded-xl text-[11px] font-bold">900</button>
                <button onclick="setGoal(1000)" class="quick-tag py-2 rounded-xl text-[11px] font-bold">1000</button>
                <button onclick="setGoal(1200)" class="quick-tag py-2 rounded-xl text-[11px] font-bold">1200</button>
                <button onclick="setGoal(1300)" class="quick-tag py-2 rounded-xl text-[11px] font-bold">1300</button>
            </div>
            <button onclick="fullReset()" class="w-full p-2 rounded-xl text-[9px] text-gray-600 font-bold uppercase tracking-widest hover:text-white transition-colors">ล้างข้อมูลทั้งหมด</button>
        </div>

        <!-- แผงแสดงผล AI -->
        <div class="glass-card p-6 sticky top-2 z-30 border-[#FE2C55]/30 border shadow-[0_0_30px_rgba(254,44,85,0.2)] text-center">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">แต้มสะสมทั้งหมด</p>
            <h2 id="totalPts" class="text-6xl font-bold text-white tracking-tighter">0</h2>
            
            <div id="aiAdvice" class="mt-4 p-3 rounded-xl bg-white/5 text-[#25F4EE] text-[11px] font-bold italic">
                <span>ระบุเป้าหมายเพื่อเริ่มวางแผน</span>
            </div>

            <div id="exchangeSummary" class="mt-4 pt-4 border-t border-gray-800 text-left space-y-3 hidden">
                <div id="exchangeList" class="text-sm text-white font-bold mb-1"></div>
                
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="copyBaseOnly(event)" class="bg-sky-500/20 hover:bg-sky-500/30 text-sky-400 text-[10px] font-bold py-3 rounded-xl border border-sky-500/30">
                        <span id="copyBaseText">คัดลอกแผนงาน</span>
                    </button>
                    <button onclick="copyUpdateOnly(event)" class="bg-[#FE2C55]/20 hover:bg-[#FE2C55]/30 text-[#FE2C55] text-[10px] font-bold py-3 rounded-xl border border-[#FE2C55]/30">
                        <span id="copyUpdateText">รางวัลรอรับ</span>
                    </button>
                </div>

                <div class="flex justify-between items-center bg-black/50 p-3 rounded-xl mt-2 text-[10px]">
                    <div>ต้องใช้: <span id="usedPts" class="text-sky-400 font-bold">0</span></div>
                    <div id="remainLabel">ขาด/เหลือ: <span id="remainPts" class="font-bold">0</span></div>
                </div>
            </div>
        </div>

        <!-- รายการคลิป -->
        <div class="glass-card p-5">
            <div class="flex justify-between items-center mb-3 text-xs font-bold uppercase tracking-widest">
                <span>🎬 รายการคลิป (<span id="clipCount" class="text-[#FE2C55]">0</span>/15)</span>
            </div>
            <div class="grid grid-cols-5 gap-3" id="clipGrid"></div>
        </div>

        <!-- รายการภารกิจ -->
        <div class="glass-card p-5 space-y-2">
            <h3 class="text-xs font-bold text-sky-400 uppercase italic border-l-2 border-sky-400 pl-2">📅 Monthly Missions</h3>
            <div id="monthlyList" class="space-y-2"></div>
        </div>

        <div class="glass-card p-5 space-y-2">
            <h3 class="text-xs font-bold text-[#FE2C55] mb-2 uppercase italic border-l-2 border-[#FE2C55] pl-2">🕒 12H Missions</h3>
            <div id="updateList" class="space-y-2"></div>
        </div>
    </div>

    <!-- Nav -->
    <nav class="fixed bottom-0 left-0 right-0 p-4 flex justify-around items-center z-50 pb-6 rounded-t-3xl shadow-[0_-10px_20px_rgba(0,0,0,0.5)]">
        <a href="index.html" class="flex flex-col items-center gap-1 text-gray-500 font-bold uppercase text-[10px]">Tags</a>
        <a href="mission.html" class="flex flex-col items-center gap-1 nav-active font-bold uppercase text-[10px] pt-1">Mission</a>
        <a href="calc.html" class="flex flex-col items-center gap-1 text-gray-500 font-bold uppercase text-[10px]">Calc</a>
    </nav>

    <script>
        const clipData = [{v:6},{v:6},{v:8},{v:8},{v:8},{v:8},{v:8},{v:10},{v:10},{v:10},{v:12},{v:12},{v:12},{v:12},{v:8}];
        const monthlyM = [{id:'m500', name:'500 วิว', pts:20}, {id:'m5k', name:'5,000 วิว', pts:20}, {id:'m30k', name:'30,000 วิว', pts:20}, {id:'m30full', name:'ครบ 30 เควสย่อย', pts:60}];
        const updateM = [{id:'l100', name:'100 ไลค์', pts:15}, {id:'v10k', name:'10k วิว/คลิป', pts:20}, {id:'c2', name:'ลงครบ 2 คลิป', pts:10}, {id:'c5', name:'ลงครบ 5 คลิป', pts:10}, {id:'c10', name:'ลงครบ 10 คลิป', pts:10}, {id:'c15', name:'ลงครบ 15 คลิป', pts:10}, {id:'tiktok', name:'ผูก TikTok', pts:10}, {id:'first', name:'ลงครั้งแรก', pts:10}];

        let selClips = new Set();
        let selMissions = new Set();
        let currentGoal = 0;

        function setGoal(val) {
            document.getElementById('customInput').value = val;
            runUltraAI();
        }

        function getBasePoints() {
            let pts = 0;
            selClips.forEach(idx => {
                if (idx === 0) pts += 20; else pts += 25;
            });
            monthlyM.forEach(m => { if(selMissions.has(m.id)) pts += m.pts; });
            return pts;
        }

        function getUpdatePoints() {
            let pts = 0;
            updateM.forEach(u => { if(selMissions.has(u.id)) pts += u.pts; });
            return pts;
        }

        function updatePoints() {
            if(selClips.size * 4 >= 30) selMissions.add('m30full'); else selMissions.delete('m30full');
            const total = getBasePoints() + getUpdatePoints();
            document.getElementById('totalPts').innerText = total.toLocaleString();
            document.getElementById('clipCount').innerText = selClips.size;
            calculateExchange(total);
        }

        function calculateExchange(pts) {
            let best = null;
            for (let c1 = 0; c1 <= 2; c1++) {
                for (let c2 = 0; c2 <= 4; c2++) {
                    for (let c3 = 0; c3 <= 10; c3++) {
                        if ((c1*500)+(c2*300)+(c3*100) === currentGoal) {
                            let cost = (c1*300)+(c2*180)+(c3*70);
                            if (!best || cost < best.cost) best = {c1, c2, c3, cost};
                        }
                    }
                }
            }
            const summary = document.getElementById('exchangeSummary');
            if (best && currentGoal > 0) {
                summary.classList.remove('hidden');
                let res = [];
                if (best.c1 > 0) res.push(`500x${best.c1}`);
                if (best.c2 > 0) res.push(`300x${best.c2}`);
                if (best.c3 > 0) res.push(`100x${best.c3}`);
                document.getElementById('exchangeList').innerText = "สูตรแลก: " + res.join(' + ');
                document.getElementById('usedPts').innerText = best.cost;
                const diff = pts - best.cost;
                document.getElementById('remainPts').innerText = diff.toLocaleString();
                document.getElementById('remainPts').className = diff < 0 ? "text-red-500 font-bold" : "text-sky-400 font-bold";
            } else { summary.classList.add('hidden'); }
        }

        function runUltraAI() {
            const val = parseInt(document.getElementById('customInput').value) || 0;
            if (val <= 0) return;
            fullReset(); currentGoal = val;
            
            let targetCost = 0;
            for(let c1=0; c1<=2; c1++) for(let c2=0; c2<=4; c2++) for(let c3=0; c3<=10; c3++) {
                if((c1*500)+(c2*300)+(c3*100) === currentGoal) {
                    let cost = (c1*300)+(c2*180)+(c3*70);
                    if(targetCost === 0 || cost < targetCost) targetCost = cost;
                }
            }
            if(targetCost === 0) { alert("คูปองต้องหาร 100 ลงตัว"); return; }

            selMissions.add('tiktok'); selMissions.add('first');
            for(let i=0; i<clipData.length; i++) {
                if (getBasePoints() + getUpdatePoints() >= targetCost) break;
                selClips.add(i);
                selMissions.add('m500'); selMissions.add('m5k'); selMissions.add('l100');
                updateMissionsByCount();
                updatePoints();
            }

            const finalTotal = getBasePoints() + getUpdatePoints();
            const advice = document.getElementById('aiAdvice');
            if (finalTotal >= targetCost) {
                advice.innerHTML = `AI แนะนำทำ <span class="text-white">${selClips.size} คลิป</span> เพื่อให้พอดีที่สุด`;
                advice.className = "mt-4 p-3 rounded-xl bg-white/5 text-[#25F4EE] text-[11px] font-bold italic";
            } else {
                const diff = targetCost - finalTotal;
                advice.innerHTML = `⚠️ แต้มไม่พอ! ขาดอีก <span class="text-white">${diff} แต้ม</span> (ลงครบ 15 คลิปแล้ว)`;
                advice.className = "mt-4 p-3 rounded-xl bg-red-500/20 text-red-400 text-[11px] font-bold italic border border-red-500/30";
            }
            render();
        }

        function updateMissionsByCount() {
            const count = selClips.size;
            if(count >= 2) selMissions.add('c2'); if(count >= 5) selMissions.add('c5');
            if(count >= 10) selMissions.add('c10'); if(count >= 15) selMissions.add('c15');
            selClips.forEach(idx => { if(clipData[idx].v >= 10) selMissions.add('v10k'); });
            let tv = Array.from(selClips).reduce((s, idx) => s + clipData[idx].v, 0);
            if(tv >= 30) selMissions.add('m30k');
        }

        function render() {
            const grid = document.getElementById('clipGrid'); grid.innerHTML = '';
            clipData.forEach((c, i) => {
                const btn = document.createElement('div');
                btn.className = `clip-btn h-12 flex flex-col items-center justify-center rounded-xl text-[10px] cursor-pointer ${selClips.has(i) ? 'selected' : 'bg-[#0a0a0a] text-gray-500'}`;
                btn.innerHTML = `<span>${i+1}</span><span class="text-[8px] opacity-60">${c.v}k</span>`;
                btn.onclick = () => { selClips.has(i) ? selClips.delete(i) : selClips.add(i); updatePoints(); render(); };
                grid.appendChild(btn);
            });
            const mList = document.getElementById('monthlyList'); mList.innerHTML = '';
            monthlyM.forEach(m => createItem(m, mList));
            const uList = document.getElementById('updateList'); uList.innerHTML = '';
            updateM.forEach(m => createItem(m, uList));
            updatePoints();
        }

        function createItem(m, container) {
            const div = document.createElement('div');
            div.className = `mission-item ${selMissions.has(m.id) ? 'active' : ''}`;
            div.innerHTML = `<span class="text-xs font-bold">${m.name} (+${m.pts})</span>`;
            div.onclick = () => { selMissions.has(m.id) ? selMissions.delete(m.id) : selMissions.add(m.id); updatePoints(); render(); };
            container.appendChild(div);
        }

        function copyBaseOnly(event) {
            const pts = getBasePoints();
            const text = `📊 แผนงานลงคลิป\nคลิปที่ลง: ${selClips.size} คลิป\nแต้มพื้นฐาน: ${pts} แต้ม`;
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById('copyBaseText').innerText = "คัดลอกแล้ว!";
                setTimeout(() => document.getElementById('copyBaseText').innerText = "คัดลอกแผนงาน", 2000);
            });
        }

        function copyUpdateOnly(event) {
            let uText = "";
            updateM.forEach(u => { if(selMissions.has(u.id)) uText += `• ${u.name}\n`; });
            const text = `🕒 รางวัลที่ต้องรอรับ\nเป้าหมาย: ${currentGoal} คูปอง\n\nรายการ:\n${uText || 'ไม่มี'}`;
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById('copyUpdateText').innerText = "คัดลอกแล้ว!";
                setTimeout(() => document.getElementById('copyUpdateText').innerText = "รางวัลรอรับ", 2000);
            });
        }

        function fullReset() { selClips.clear(); selMissions.clear(); currentGoal = 0; document.getElementById('customInput').value = ''; render(); }
        window.onload = render;
    </script>
</body>
</html>
