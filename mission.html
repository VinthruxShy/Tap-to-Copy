<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoV Ultra Planner - Vinthrux</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Chakra Petch', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; }
        .glass-card { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
        .mission-item { background: #111; border: 1px solid #222; transition: 0.2s; padding: 10px 14px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .mission-item.active { border-color: #FE2C55; background: rgba(254, 44, 85, 0.1); }
        .clip-btn { transition: all 0.2s; border: 1px solid #222; position: relative; }
        .clip-btn.selected { background: #FE2C55; border-color: #FE2C55; color: white; box-shadow: 0 0 10px rgba(254, 44, 85, 0.4); }
        .vip-badge { position: absolute; top: -6px; right: -6px; background: #FFD700; color: #000; font-size: 7px; padding: 1px 4px; border-radius: 4px; font-weight: bold; }
        .nav-professional { background: rgba(10, 10, 10, 0.98); border-top: 1px solid rgba(255, 255, 255, 0.1); }
        input:focus { border-color: #FE2C55 !important; outline: none; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-md space-y-4 mb-32">
        <header class="text-center py-4 border-b border-gray-900">
            <h1 class="text-2xl font-bold tracking-tighter uppercase italic">RoV <span class="text-[#FE2C55]">ULTRA</span> AI</h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-1">High-Precision Planning System</p>
        </header>

        <div class="glass-card p-5 border-[#FE2C55]/20 border">
            <h3 class="text-[10px] text-gray-500 uppercase font-bold mb-3 text-center tracking-widest">เป้าหมายคูปองที่ต้องการ (กรอกตัวเลข)</h3>
            <div class="flex gap-2">
                <input type="number" id="customInput" placeholder="เช่น 1300" 
                    class="flex-grow bg-black border border-gray-800 p-4 rounded-2xl text-xl font-bold text-center">
                <button onclick="runUltraAI()" 
                    class="bg-[#FE2C55] text-white px-8 rounded-2xl font-bold text-sm active:scale-95 transition-all">คำนวณ</button>
            </div>
            <button onclick="fullReset()" class="w-full mt-3 p-2 rounded-xl text-[10px] bg-gray-900 text-gray-500 font-bold uppercase">ล้างข้อมูลทั้งหมด</button>
        </div>

        <div class="glass-card p-6 sticky top-2 z-30 border-[#FE2C55]/30 border shadow-[0_0_30px_rgba(254,44,85,0.2)] text-center">
            <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">แต้มสะสมทั้งหมด</p>
            <h2 id="totalPts" class="text-6xl font-bold text-white tracking-tighter">0</h2>
            
            <div id="aiAdvice" class="mt-4 p-3 rounded-xl bg-white/5 text-[#25F4EE] text-[11px] font-bold min-h-[40px] flex flex-col justify-center italic">
                <span>กรอกจำนวนคูปองแล้วกด "คำนวณ"</span>
            </div>

            <div id="exchangeSummary" class="mt-4 pt-4 border-t border-gray-800 text-left space-y-2 hidden">
                <p class="text-[9px] text-gray-500 uppercase font-bold mb-1 italic">สรุปการแลกรางวัล:</p>
                <div id="exchangeList" class="text-sm text-white font-bold"></div>
                <div class="flex justify-between items-center bg-black/50 p-3 rounded-xl mt-2">
                    <div class="flex flex-col">
                        <span class="text-[9px] text-gray-400">ใช้แต้มรวม</span>
                        <span id="usedPts" class="text-sky-400 font-bold">0</span>
                    </div>
                    <div class="flex flex-col text-right">
                        <span class="text-[9px] text-gray-400">แต้มคงเหลือ</span>
                        <span id="remainPts" class="text-[#FE2C55] font-bold">0</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card p-5">
            <div class="flex justify-between items-center mb-3 text-xs font-bold uppercase tracking-widest">
                <span>🎬 คลิปที่ส่ง (<span id="clipCount" class="text-[#FE2C55]">0</span>/22)</span>
                <span class="text-[9px] text-gray-500">ย่อย: <span id="subCount" class="text-white">0</span>/30</span>
            </div>
            <div class="grid grid-cols-5 gap-3" id="clipGrid"></div>
        </div>

        <div class="glass-card p-5 space-y-2">
            <h3 class="text-xs font-bold text-sky-400 mb-2 uppercase italic border-l-2 border-sky-400 pl-2">📅 Monthly Missions</h3>
            <div id="monthlyList" class="space-y-2"></div>
        </div>
        <div class="glass-card p-5 space-y-2">
            <h3 class="text-xs font-bold text-[#FE2C55] mb-2 uppercase italic border-l-2 border-[#FE2C55] pl-2">🕒 12H & VIP Missions</h3>
            <div id="updateList" class="space-y-2"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 nav-professional p-4 flex justify-around items-center z-40 pb-6 rounded-t-3xl">
        <a href="index.html" class="flex flex-col items-center gap-1 text-gray-500 font-bold uppercase text-[10px]">Tags</a>
        <a href="mission.html" class="flex flex-col items-center gap-1 text-[#FE2C55] font-bold uppercase text-[10px]">Mission</a>
        <a href="calc.html" class="flex flex-col items-center gap-1 text-gray-500 font-bold uppercase text-[10px]">Calc</a>
    </nav>

    <script>
        const clipData = [{v:6},{v:6},{v:8,vip:true},{v:8,vip:true},{v:8,vip:true},{v:8,vip:true},{v:8,vip:true},{v:10,vip:true},{v:10,vip:true},{v:10,vip:true},{v:8,vip:true},{v:8,vip:true},{v:8,vip:true},{v:10,vip:true},{v:10,vip:true},{v:10,vip:true},{v:10,vip:true},{v:12,vip:true},{v:12,vip:true},{v:12,vip:true},{v:12,vip:true},{v:10,vip:true}];
        const monthlyM = [{id:'m500',name:'500 วิว',pts:20},{id:'m5k',name:'5,000 วิว',pts:20},{id:'m30k',name:'30,000 วิว',pts:20},{id:'m30full',name:'ครบ 30 เควสย่อย',pts:60}];
        const updateM = [{id:'l100',name:'100 ไลค์',pts:15},{id:'v10k',name:'10k วิว/คลิป',pts:20},{id:'c2',name:'ลงครบ 2 คลิป',pts:10},{id:'c5',name:'ลงครบ 5 คลิป',pts:10},{id:'c10',name:'ลงครบ 10 คลิป',pts:10},{id:'c15',name:'ลงครบ 15 คลิป',pts:10},{id:'vip1',name:'VIP 1 งาน',pts:10},{id:'vip3',name:'VIP 3 งาน',pts:10},{id:'vip7',name:'VIP 7 งาน',pts:10},{id:'vip12',name:'VIP 12 งาน',pts:10},{id:'tiktok',name:'ผูก TikTok',pts:10},{id:'first',name:'ลงครั้งแรก',pts:10}];

        let selClips = new Set();
        let selMissions = new Set();
        let currentGoal = 0;

        function render() {
            const grid = document.getElementById('clipGrid'); grid.innerHTML = '';
            clipData.forEach((c, i) => {
                const isSel = selClips.has(i);
                const btn = document.createElement('div');
                btn.className = `clip-btn h-12 flex flex-col items-center justify-center rounded-xl text-[10px] cursor-pointer ${isSel ? 'selected' : 'bg-[#0a0a0a] text-gray-500'}`;
                btn.innerHTML = `<span>${i+1}</span><span class="text-[8px] opacity-60">${c.v}k</span>${c.vip ? '<span class="vip-badge">VIP</span>' : ''}`;
                btn.onclick = () => { toggleClip(i); clearAI(); };
                grid.appendChild(btn);
            });
            const mC = document.getElementById('monthlyList'); mC.innerHTML = '';
            monthlyM.forEach(m => createItem(m, mC));
            const uC = document.getElementById('updateList'); uC.innerHTML = '';
            updateM.forEach(m => createItem(m, uC));
            updatePoints();
        }

        function createItem(m, container) {
            const active = selMissions.has(m.id);
            const div = document.createElement('div');
            div.className = `mission-item ${active ? 'active' : ''}`;
            div.innerHTML = `<span class="text-xs font-bold">${m.name} (+${m.pts})</span> <input type="checkbox" ${active?'checked':''}>`;
            div.onclick = () => { toggleMission(m.id); clearAI(); };
            container.appendChild(div);
        }

        function toggleClip(i) { selClips.has(i) ? selClips.delete(i) : selClips.add(i); render(); }
        function toggleMission(id) { selMissions.has(id) ? selMissions.delete(id) : selMissions.add(id); render(); }

        function updatePoints() {
            let pts = selClips.size * 25;
            selMissions.forEach(id => {
                const m = [...monthlyM, ...updateM].find(x => x.id === id);
                if(m) pts += m.pts;
            });
            const sub = selClips.size * 4;
            if(sub >= 30) selMissions.add('m30full'); else selMissions.delete('m30full');
            document.getElementById('totalPts').innerText = pts;
            document.getElementById('clipCount').innerText = selClips.size;
            document.getElementById('subCount').innerText = sub;
            calculateExchange(pts);
        }

        function calculateExchange(pts) {
            const rewards = [{p:500,c:300,l:2}, {p:300,c:180,l:3}, {p:100,c:70,l:4}];
            let target = currentGoal;
            let best = null;

            for (let c1 = 0; c1 <= rewards[0].l; c1++) {
                for (let c2 = 0; c2 <= rewards[1].l; c2++) {
                    for (let c3 = 0; c3 <= rewards[2].l; c3++) {
                        if ((c1*500) + (c2*300) + (c3*100) === target) {
                            let cost = (c1*300) + (c2*180) + (c3*70);
                            if (!best || cost < best.cost) best = {c1, c2, c3, cost};
                        }
                    }
                }
            }

            const summary = document.getElementById('exchangeSummary');
            if (best && target > 0) {
                summary.classList.remove('hidden');
                let res = [];
                if (best.c1 > 0) res.push(`500 ปอง x ${best.c1}`);
                if (best.c2 > 0) res.push(`300 ปอง x ${best.c2}`);
                if (best.c3 > 0) res.push(`100 ปอง x ${best.c3}`);
                document.getElementById('exchangeList').innerText = res.join(' + ');
                document.getElementById('usedPts').innerText = best.cost;
                document.getElementById('remainPts').innerText = pts - best.cost;
            } else summary.classList.add('hidden');
        }

        function runUltraAI() {
            fullReset();
            const target = parseInt(document.getElementById('customInput').value) || 0;
            currentGoal = target;

            // หาแต้มที่ต้องใช้
            let needed = 0;
            const rewards = [{p:500,c:300,l:2}, {p:300,c:180,l:3}, {p:100,c:70,l:4}];
            for(let c1=0;c1<=2;c1++)for(let c2=0;c2<=3;c2++)for(let c3=0;c3<=4;c3++){
                if((c1*500)+(c2*300)+(c3*100)===target) {
                    let cost = (c1*300)+(c2*180)+(c3*70);
                    if(needed===0 || cost<needed) needed = cost;
                }
            }

            if(needed === 0) return alert("ไม่พบสูตรการแลกคูปองจำนวนนี้ โปรดลอง 600, 800, 1000, 1300...");

            // --- AI STRATEGY ---
            // 1. ติ๊กเควสพื้นฐานที่ต้องทำชัวร์ๆ
            selMissions.add('tiktok'); selMissions.add('first'); selMissions.add('m500'); selMissions.add('m5k'); selMissions.add('l100');

            // 2. ลูปคลิป (Priority: คลิป VIP และคลิปที่ให้แต้มเยอะ)
            for(let i=0; i<clipData.length; i++) {
                updatePoints();
                if(parseInt(document.getElementById('totalPts').innerText) >= needed) break;
                
                selClips.add(i);
                
                // ตรวจสอบเควสสะสมคลิป
                if(selClips.size >= 2) selMissions.add('c2');
                if(selClips.size >= 5) selMissions.add('c5');
                if(selClips.size >= 10) selMissions.add('c10');
                if(selClips.size >= 15) selMissions.add('c15');

                // ตรวจเควส VIP
                const vC = Array.from(selClips).filter(idx => clipData[idx].vip).length;
                if(vC >= 1) selMissions.add('vip1');
                if(vC >= 3) selMissions.add('vip3');
                if(vC >= 7) selMissions.add('vip7');
                if(vC >= 12) selMissions.add('vip12');

                // ตรวจวิว
                if(clipData[i].v >= 10) selMissions.add('v10k');
                let totalV = Array.from(selClips).reduce((s, idx) => s + clipData[idx].v, 0);
                if(totalV >= 30) selMissions.add('m30k');
            }

            document.getElementById('aiAdvice').innerHTML = `AI วางแผนเสร็จสิ้น! เพื่อให้ได้ <span class="text-white">${target} ปอง</span> <br>แนะนำทำ <span class="text-white">${selClips.size} คลิป</span> พร้อมภารกิจที่ติ๊กไว้`;
            render();
        }

        function fullReset() {
            selClips.clear(); selMissions.clear(); currentGoal = 0;
            document.getElementById('aiAdvice').innerText = "ระบุเป้าหมายเพื่อรันการคำนวณ...";
            render();
        }

        function clearAI() { document.getElementById('aiAdvice').innerText = "โหมดปรับแต่งเอง (Manual Mode)"; }

        render();
    </script>
</body>
</html>
