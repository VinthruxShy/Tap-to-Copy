<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoV Calculator Pro - Vinthrux</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Chakra Petch', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; }
        .nav-professional {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        .nav-item-active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background-color: #FE2C55;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(254, 44, 85, 0.7);
        }
        input:focus { border-color: #FE2C55 !important; outline: none; }
        .glass-card { background: #111; border: 1px solid #222; border-radius: 24px; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-md space-y-4 mb-24">
        <header class="text-center py-6 border-b border-gray-900 mb-4">
            <h1 class="text-2xl font-bold tracking-tighter text-white uppercase">Pro <span class="text-[#FE2C55]">Calculator</span></h1>
            <p class="text-[11px] text-gray-500 uppercase tracking-widest mt-1">Calculate earnings & track orders</p>
        </header>

        <div class="glass-card p-6 shadow-2xl">
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-gray-500 uppercase tracking-widest ml-1">เรทราคา (ต่อ 1,000 วิว)</label>
                    <input type="number" id="rate" step="0.001" oninput="doCalc()" placeholder="0.015"
                        class="w-full bg-black border border-gray-800 p-4 rounded-xl mt-1 text-xl font-bold text-white transition-all">
                </div>
                <div class="flex gap-3">
                    <div class="w-1/2">
                        <label class="text-[10px] text-gray-500 uppercase tracking-widest ml-1 text-nowrap">ยอดวิวต่อคลิป</label>
                        <input type="number" id="views" oninput="doCalc()" placeholder="12000"
                            class="w-full bg-black border border-gray-800 p-4 rounded-xl mt-1 font-bold text-white transition-all">
                    </div>
                    <div class="w-1/2">
                        <label class="text-[10px] text-gray-500 uppercase tracking-widest ml-1">จำนวนคลิป</label>
                        <input type="number" id="clips" oninput="doCalc()" placeholder="6"
                            class="w-full bg-black border border-gray-800 p-4 rounded-xl mt-1 font-bold text-white transition-all">
                    </div>
                </div>
            </div>

            <div class="mt-8 py-8 bg-black/50 rounded-3xl border border-[#FE2C55]/20 text-center relative overflow-hidden">
                <div class="text-[10px] text-gray-500 uppercase tracking-tighter mb-1">ยอดสุทธิที่ต้องจัดเก็บ</div>
                <div class="text-5xl font-bold text-white" id="result">0.00</div>
                <div class="text-[#FE2C55] font-bold text-sm mt-1">THB</div>
            </div>

            <button onclick="copyAndSave()" class="w-full mt-6 py-4 bg-white text-black font-bold rounded-xl active:scale-95 transition-all text-sm uppercase tracking-widest">
                Copy Summary & Save
            </button>
        </div>

        <div class="pt-4">
            <h3 class="text-[11px] text-gray-500 uppercase tracking-widest mb-3 ml-1">History (Recent)</h3>
            <div id="historyList" class="space-y-2">
                </div>
        </div>
    </div>

    <div id="toast" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-[#FE2C55] text-white px-8 py-4 rounded-xl font-bold shadow-2xl transition-all opacity-0 pointer-events-none z-50 text-sm">
        SAVED & COPIED ✅
    </div>

    <nav class="fixed bottom-0 left-0 right-0 nav-professional p-4 flex justify-around items-center z-40 pb-6 rounded-t-3xl">
        <a href="index.html" class="nav-item flex flex-col items-center gap-1.5 text-gray-500 hover:text-white transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 7h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[11px] font-medium uppercase tracking-wider">Tags</span>
        </a>
        <a href="calc.html" class="nav-item nav-item-active flex flex-col items-center gap-1.5 text-[#FE2C55]">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h2a2 2 0 002-2zm6-10V7a2 2 0 00-2-2h-2a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2zm0 0v10a2 2 0 002 2h2a2 2 0 002-2v-10a2 2 0 002 2h2a2 2 0 002-2z"></path></svg>
            <span class="text-[11px] font-medium uppercase tracking-wider">Calculator</span>
        </a>
    </nav>

    <script>
        let history = JSON.parse(localStorage.getItem('calc_history')) || [];

        function doCalc() {
            const r = parseFloat(document.getElementById('rate').value) || 0;
            const v = parseFloat(document.getElementById('views').value) || 0;
            const c = parseFloat(document.getElementById('clips').value) || 0;
            const total = (v / 1000) * c * r;
            document.getElementById('result').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        function copyAndSave() {
            const r = document.getElementById('rate').value;
            const v = document.getElementById('views').value;
            const c = document.getElementById('clips').value;
            const total = document.getElementById('result').innerText;

            if(!r || !v || !c) return;

            const text = `📊 รายละเอียดงาน\nยอดวิว: ${v} /คลิป\nจำนวน: ${c} คลิป\nเรทราคา: ${r}\n💰 สรุปยอด: ${total} บาท`;
            
            navigator.clipboard.writeText(text).then(() => {
                const item = { id: Date.now(), v, c, total, date: new Date().toLocaleTimeString() };
                history.unshift(item);
                if(history.length > 5) history.pop();
                localStorage.setItem('calc_history', JSON.stringify(history));
                showHistory();
                showToast();
            });
        }

        function showHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            history.forEach(h => {
                const div = document.createElement('div');
                div.className = "bg-[#111] p-4 rounded-xl flex justify-between items-center border border-gray-900";
                div.innerHTML = `
                    <div class="text-xs">
                        <div class="text-gray-500 text-[10px]">${h.date}</div>
                        <div class="text-gray-300 font-bold">${h.v} วิว x ${h.c} คลิป</div>
                    </div>
                    <div class="text-[#FE2C55] font-bold text-sm">${h.total} ฿</div>
                `;
                list.appendChild(div);
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.opacity = "1";
            setTimeout(() => toast.style.opacity = "0", 1500);
        }

        showHistory();
    </script>
</body>
</html>
