<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoV Calc Pro - Vinthrux</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Chakra Petch', sans-serif; background-color: #09090b; color: #ffffff; margin: 0; padding: 0; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; padding: 1.5rem; padding-bottom: 160px; }
        .dashboard-box { background-color: #121217; border: 1px solid rgba(254, 44, 85, 0.2); border-radius: 32px; padding: 1.75rem; margin-bottom: 2rem; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(254, 44, 85, 0.05); }
        .clip-card { background-color: #18181b; border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 24px; padding: 1.15rem 1.5rem; margin-bottom: 0.85rem; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); user-select: none; }
        .clip-card:hover { border-color: rgba(254, 44, 85, 0.3); background-color: #1c1c21; }
        .clip-card.active { background: linear-gradient(135deg, #fe2c55 0%, #ff5e7d 100%); border-color: transparent; transform: scale(1.03); box-shadow: 0 12px 25px rgba(254, 44, 85, 0.35); }
        .clip-card.special-active { background: linear-gradient(135deg, #00f2ff 0%, #0088ff 100%) !important; box-shadow: 0 12px 25px rgba(0, 242, 255, 0.25) !important; }
        .price-display { font-size: 4.2rem; font-weight: 700; color: #fe2c55; line-height: 1; text-shadow: 0 8px 15px rgba(254, 44, 85, 0.25); letter-spacing: -2px; }
        input { background-color: #09090b !important; border: 1px solid #27272a !important; border-radius: 20px !important; color: white !important; padding: 0.85rem !important; transition: all 0.2s; }
        input:focus { border-color: #fe2c55 !important; background-color: #000000 !important; box-shadow: 0 0 0 4px rgba(254, 44, 85, 0.1) !important; outline: none; }
        .btn-action { transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .btn-action:active { transform: scale(0.92); filter: brightness(0.9); }
        .bottom-tabs { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(9, 9, 11, 0.85); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.05); padding: 1rem 1rem 2.8rem 1rem; display: flex; justify-content: space-around; z-index: 1000; }
        .diff-badge { font-size: 10px; padding: 4px 12px; border-radius: 99px; font-weight: 700; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="text-center py-8">
            <h1 class="text-4xl font-bold italic tracking-tighter">ROV <span class="text-[#fe2c55]">CALC</span> PRO</h1>
            <p class="text-[10px] text-zinc-500 uppercase tracking-[0.4em] mt-1 font-bold">PREMIUM SOFT UI VERSION</p>
        </header>

        <div class="dashboard-box">
            <div class="grid grid-cols-2 gap-4 mb-5">
                <div>
                    <label class="text-[10px] text-zinc-500 uppercase font-bold mb-1.5 block tracking-widest px-1">เลือกด่วน (1-24)</label>
                    <input type="number" id="inputAmount" min="0" max="24" oninput="autoSelect()" placeholder="0" class="w-full text-center font-bold text-xl">
                </div>
                <div>
                    <label class="text-[10px] text-zinc-500 uppercase font-bold mb-1.5 block text-[#fe2c55] tracking-widest px-1">เรทราคา</label>
                    <input type="number" id="inputRate" step="0.0001" oninput="recalc()" value="0.6445" class="w-full text-center font-bold text-xl">
                </div>
            </div>

            <div class="bg-black/40 p-5 rounded-[28px] border border-white/5 mb-4 shadow-inner">
                <div class="flex justify-between items-center mb-2.5 px-1">
                    <label class="text-[10px] text-zinc-400 uppercase font-bold italic">บวกวิวกันขาด / คลิป (+)</label>
                    <span id="extraLabel" class="text-[10px] font-black text-[#fe2c55] tracking-widest">0 EXTRA</span>
                </div>
                <input type="number" id="inputExtra" step="100" oninput="recalc()" value="0" class="w-full text-center font-bold text-xl">
            </div>

            <div class="flex items-end justify-between mb-6 px-1 border-b border-white/5 pb-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-[9px] text-zinc-500 uppercase font-bold tracking-widest">เรทอ้างอิงเปรียบเทียบ:</label>
                    <div class="flex items-center gap-2">
                        <input type="number" id="baseRateInput" step="0.0001" oninput="recalc()" value="0.6445" class="bg-transparent border-b border-zinc-800 text-[14px] font-bold text-zinc-300 focus:text-white focus:border-[#fe2c55] w-20 outline-none transition-all pb-0.5">
                        <button onclick="setAsBase()" class="text-[9px] text-[#fe2c55] font-bold uppercase hover:underline bg-[#fe2c55]/10 px-2.5 py-1.5 rounded-xl transition-all">ดึงเรทปัจจุบัน</button>
                    </div>
                </div>
                <div id="diffContainer" class="hidden pb-1">
                    <span id="diffBadge" class="diff-badge"></span>
                </div>
            </div>

            <div class="text-center bg-black/50 py-10 rounded-[40px] border border-zinc-800/50 shadow-inner relative overflow-hidden">
                <div id="statBadge" class="absolute top-4 right-6 text-[9px] font-bold text-zinc-600 uppercase tracking-[0.2em]">SELECTED: 0/24</div>
                <div class="mb-8">
                    <div class="text-[11px] text-zinc-500 uppercase font-bold mb-3 tracking-[0.2em]">ยอดรวมสุทธิ</div>
                    <div class="price-display" id="displayPrice">0.00</div>
                    <div class="text-zinc-600 text-[10px] font-bold mt-3 uppercase tracking-widest">THB Currency</div>
                </div>
                <div class="w-2/3 h-[1px] bg-zinc-800/50 mx-auto mb-8"></div>
                <div class="px-6">
                    <div class="text-[11px] text-zinc-500 uppercase font-bold mb-1.5 tracking-widest">ยอดวิวรวมสุทธิ</div>
                    <div class="text-4xl font-bold tracking-tight" id="displayTotalViews">0</div>
                    <div id="displaySubStats" class="text-[10px] text-zinc-700 font-bold mt-3 uppercase tracking-widest">BASE: 0 • BUFFER: 0</div>
                </div>
            </div>

            <div id="copyPanel" class="grid grid-cols-2 gap-4 mt-8 hidden">
                <button onclick="copyMsg('customer')" id="btnCust" class="btn-action py-5 bg-zinc-800/50 hover:bg-zinc-800 text-white text-[11px] font-bold rounded-[24px] border border-white/5 uppercase tracking-wider flex flex-col items-center shadow-lg">
                    <span>👤 ส่งให้ลูกค้า</span>
                    <span class="text-[7.5px] opacity-40 font-normal mt-1.5">(เฉพาะรายการแท็ก)</span>
                </button>
                <button onclick="copyMsg('seller')" id="btnSell" class="btn-action py-5 bg-[#fe2c55] hover:bg-[#ff456a] text-white text-[11px] font-bold rounded-[24px] shadow-xl shadow-[#fe2c55]/20 uppercase tracking-wider flex flex-col items-center">
                    <span>💰 สำหรับคนขาย</span>
                    <span class="text-[7.5px] text-white/60 font-normal mt-1.5">(สถิติ & ยอดเงิน)</span>
                </button>
            </div>
        </div>

        <div class="w-full bg-[#0c0c0e] p-7 rounded-[40px] border border-zinc-900 shadow-2xl">
            <div class="flex justify-between items-center mb-8 px-1">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-6 bg-[#fe2c55] rounded-full shadow-[0_0_10px_#fe2c55]"></div>
                    <h3 class="text-[14px] font-black uppercase tracking-[0.2em] text-white">รายการคลิปทั้งหมด</h3>
                </div>
                <button onclick="resetAll()" class="text-[11px] font-bold text-zinc-600 hover:text-red-500 uppercase tracking-widest transition-colors">ล้างทั้งหมด</button>
            </div>
            <div id="listView"></div>
        </div>
    </div>

    <div class="bottom-tabs">
        <a href="index.html" class="flex flex-col items-center gap-1.5 text-zinc-700 opacity-40 hover:opacity-100 transition-opacity">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[9px] font-black uppercase tracking-tighter">Tags</span>
        </a>
        <a href="mission.html" class="flex flex-col items-center gap-1.5 text-zinc-700 opacity-40 hover:opacity-100 transition-opacity">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12z"></path></svg>
            <span class="text-[9px] font-black uppercase tracking-tighter">Mission</span>
        </a>
        <div class="flex flex-col items-center gap-1.5 text-[#fe2c55]">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h2a2 2 0 002-2zm6-10V7a2 2 0 00-2-2h-2a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2zm0 0v10a2 2 0 002 2h2a2 2 0 002-2v-10z"></path></svg>
            <span class="text-[9px] font-black uppercase tracking-tighter">Calc</span>
        </div>
    </div>

    <script>
        const clipDatabase = [
            { id: 1, tags: "#RoV #RoVเป็นเกมตลก #คลิปRoV", v: 6000 },
            { id: 2, tags: "#RoV #คลิปRoV #rovth", v: 6000 },
            { id: 3, tags: "#RoV #ควิกแชทนี้พี่จัดให้ #หยุดโลกด้วยเสียง #GildurPASULOL", v: 8000 },
            { id: 4, tags: "#RoV #Flowborn #ฮีโร่ใหม่RoV #FlowbornPreheat", v: 8000 },
            { id: 5, tags: "#RoV #RoVเป็นเกมตลก #rovth", v: 8000 },
            { id: 6, tags: "#RoV #RoVเป็นเกมตลก #fpy", v: 8000 },
            { id: 7, tags: "#RoV #RoVเป็นเกมตลก #trending", v: 8000 },
            { id: 8, tags: "#RoV #RoVเป็นเกมตลก #เล่นRoV", v: 10000 },
            { id: 9, tags: "#RoV #RoVเป็นเกมตลก #RoVเกมภาพสวย", v: 10000 },
            { id: 10, tags: "#RoV #rovth #RoVThailand", v: 10000 },
            { id: 11, tags: "#RoV #ควิกแชทนี้พี่จัดให้ #TeamKongInRoV", v: 8000 },
            { id: 12, tags: "#RoV #RoVเรียกเพื่อนกลับบ้าน #CallbackRoV", v: 8000 },
            { id: 13, tags: "#RoV #RoVเป็นเกมตลก #บัฟปรับใหม่ฮีโร่RoV", v: 8000 },
            { id: 14, tags: "#RoV #DesperateFight #RoVอัปเดตแพทช์ใหม่", v: 10000 },
            { id: 15, tags: "#RoV #FlowbornGuide #ฮีโร่ใหม่RoV #RoVFlowborn", v: 10000 },
            { id: 16, tags: "#RoV #ROVThailand #สกินMythicalเล่นฟรี", v: 10000 },
            { id: 17, tags: "#RoV #ROVThailand #RoVเปิดหมดทุกโหมด", v: 10000 },
            { id: 18, tags: "#RoV #rovth #fpy", v: 12000 },
            { id: 19, tags: "#RoV #rovth #trending", v: 12000 },
            { id: 20, tags: "#RoV #rovth #เล่นRoV", v: 12000 },
            { id: 21, tags: "#RoV #rovth #RoVเกมภาพสวย", v: 12000 },
            { id: 22, tags: "#RoV #rovth #คลิปRoV", v: 10000 },
            { id: 23, tags: "#RoV #ฉันเชียร์ทีมนี้ #GodlikeCreatorCup #RoVThailand", v: 10000 },
            { id: 24, tags: "#RoV #rovth #GodlikeCreatorCup #คลิปRoV", v: 10000 }
        ];

        let selected = [];

        function render() {
            const listContainer = document.getElementById('listView');
            listContainer.innerHTML = '';
            clipDatabase.forEach(item => {
                const isActive = selected.includes(item.id);
                const isSpecial = (item.id === 23 || item.id === 24);
                const div = document.createElement('div');
                div.className = `clip-card ${isActive ? 'active' : ''} ${isActive && isSpecial ? 'special-active' : ''}`;
                div.onclick = () => toggle(item.id);
                div.innerHTML = `
                    <div class="flex-grow">
                        <div class="text-[12.5px] font-bold opacity-90 leading-snug select-none">${item.tags}</div>
                        <div class="text-[9px] font-bold mt-1.5 uppercase opacity-60">VIEW: ${item.v.toLocaleString()}</div>
                        ${isSpecial ? '<span class="block text-[8px] text-cyan-400 uppercase tracking-widest mt-1">Special Clip</span>' : ''}
                    </div>
                    <div class="font-black text-xl ml-4 select-none">${(item.v/1000)}k</div>
                `;
                listContainer.appendChild(div);
            });
        }

        function toggle(id) {
            if (selected.includes(id)) {
                selected = selected.filter(i => i !== id);
            } else {
                selected.push(id);
            }
            document.getElementById('inputAmount').value = selected.length || "";
            updateUI();
        }

        function autoSelect() {
            const val = parseInt(document.getElementById('inputAmount').value) || 0;
            const amount = Math.min(Math.max(val, 0), 24);
            selected = [];
            for (let i = 0; i < amount; i++) {
                selected.push(clipDatabase[i].id);
            }
            updateUI();
        }

        function resetAll() {
            selected = [];
            document.getElementById('inputAmount').value = "";
            updateUI();
        }

        function setAsBase() {
            const current = document.getElementById('inputRate').value;
            document.getElementById('baseRateInput').value = current;
            recalc();
        }

        function recalc() {
            const rate = parseFloat(document.getElementById('inputRate').value) || 0;
            const baseRateInput = parseFloat(document.getElementById('baseRateInput').value) || 0;
            const extra = parseInt(document.getElementById('inputExtra').value) || 0;
            const baseSum = selected.reduce((sum, id) => sum + (clipDatabase.find(c => c.id === id)?.v || 0), 0);
            const extraSum = selected.length * extra;
            const totalSum = baseSum + extraSum;
            const cash = (totalSum / 1000) * rate;
            const baseCash = (totalSum / 1000) * baseRateInput;
            const diff = cash - baseCash;

            document.getElementById('displayPrice').innerText = cash.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('displayTotalViews').innerText = totalSum.toLocaleString();
            document.getElementById('extraLabel').innerText = `${extraSum.toLocaleString()} EXTRA VIEWS`;
            document.getElementById('displaySubStats').innerText = `BASE: ${baseSum.toLocaleString()} • BUFFER: ${extraSum.toLocaleString()}`;

            const diffContainer = document.getElementById('diffContainer');
            const diffBadge = document.getElementById('diffBadge');
            if (rate !== baseRateInput && selected.length > 0) {
                diffContainer.classList.remove('hidden');
                diffBadge.innerText = `${diff > 0 ? '+' : ''}${diff.toFixed(2)} THB`;
                diffBadge.style.backgroundColor = diff > 0 ? 'rgba(34, 197, 94, 0.15)' : 'rgba(239, 68, 68, 0.15)';
                diffBadge.style.color = diff > 0 ? '#22c55e' : '#ef4444';
            } else { diffContainer.classList.add('hidden'); }
        }

        function updateUI() {
            render();
            document.getElementById('statBadge').innerText = `SELECTED: ${selected.length}/24`;
            document.getElementById('copyPanel').classList.toggle('hidden', selected.length === 0);
            recalc();
        }

        function copyMsg(mode) {
            const rate = document.getElementById('inputRate').value;
            const baseRateVal = document.getElementById('baseRateInput').value;
            const extra = document.getElementById('inputExtra').value;
            const finalViews = document.getElementById('displayTotalViews').innerText;
            const finalPrice = document.getElementById('displayPrice').innerText;
            const baseSum = selected.reduce((sum, id) => sum + (clipDatabase.find(c => c.id === id)?.v || 0), 0);
            const extraSum = selected.length * extra;
            const sorted = [...selected].sort((a, b) => a - b);
            
            let finalOutput = "";
            if (mode === 'customer') {
                let tagsOnly = sorted.map((id, index) => {
                    const clip = clipDatabase.find(c => c.id === id);
                    return `${index + 1}. ${clip.tags} (View: ${(clip.v/1000)}k)`;
                }).join('\n');
                finalOutput = `ลูกค้ารับคลิปตามแท็กด้านล่างนี้ได้เลยย\n━━━━━━━━━━━━━━━━\n${tagsOnly}\n━━━━━━━━━━━━━━━━`;
            } else {
                const diff = (parseFloat(rate) - parseFloat(baseRateVal)) * ( (baseSum + extraSum) / 1000 );
                const diffTxt = rate != baseRateVal ? `\n⚠️ ส่วนต่างเรทฐาน: ${diff > 0 ? '+' : ''}${diff.toFixed(2)} บาท` : '';
                finalOutput = `📋 สรุปยอดขาย (Internal Report)\n━━━━━━━━━━━━━━━━\n🎬 จำนวน: ${selected.length} คลิป\n📈 วิวพื้นฐาน: ${baseSum.toLocaleString()}\n➕ วิวกันขาด (+${extra}/คลิป): ${extraSum.toLocaleString()}\n📊 วิวรวมสุทธิ: ${finalViews}\n💵 เรทราคา: ${rate}${diffTxt}\n💰 รวมเงินสุทธิ: ${finalPrice} บาท\n━━━━━━━━━━━━━━━━\n📅 ${new Date().toLocaleDateString('th-TH')} ${new Date().toLocaleTimeString('th-TH')}`;
            }

            navigator.clipboard.writeText(finalOutput);
            const targetBtn = mode === 'customer' ? 'btnCust' : 'btnSell';
            const originalContent = document.getElementById(targetBtn).innerHTML;
            document.getElementById(targetBtn).innerText = "คัดลอกสำเร็จแล้ว! ✅";
            setTimeout(() => { document.getElementById(targetBtn).innerHTML = originalContent; }, 1500);
        }

        window.onload = render;
    </script>
</body>
</html>
